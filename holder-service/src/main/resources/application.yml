server:
  port: 8082

spring:
  application:
    name: holder-service
  datasource:
    url: jdbc:postgresql://localhost:5432/holder_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      sqs:
        endpoint: http://localhost:4566

security:
  jwt:
    secret: my-super-secret-key-for-rpe-challenge-2026
    expiration-seconds: 3600
  in-memory:
    username: admin
    password: admin123
    role: ADMIN

app:
  sqs:
    card-issuance-queue: card-issuance-queue
  clients:
    card-service:
      base-url: http://localhost:8083

springdoc:
  swagger-ui:
    path: /swagger-ui.html
